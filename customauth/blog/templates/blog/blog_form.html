{% extends 'base.html' %}

{% block title %}Blog Form{% endblock %}

{% block content %}
<h1>{% if form.instance.pk %}Edit{% else %}Create{% endif %} Blog</h1>

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save</button>
</form>

<a href="{% url 'blog_list' %}">Back to all blogs</a>
{% endblock %}
