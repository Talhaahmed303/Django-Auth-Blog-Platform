{% extends 'base.html' %}

{% block title %}Delete Blog{% endblock %}

{% block content %}
<h1>Delete Blog</h1>
<p>Are you sure you want to delete "{{ blog.title }}"?</p>

<form method="POST">
    {% csrf_token %}
    <button type="submit">Yes, Delete</button>
</form>

<a href="{% url 'blog_detail' blog.slug %}">Cancel</a>
{% endblock %}
